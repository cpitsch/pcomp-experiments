# Download the event log from https://data.4tu.nl/articles/dataset/Road_Traffic_Fine_Management_Process/12683249
input = "../Road_Traffic_Fine_Management_Process.xes.gz"
output = "road_traffic_synthetic_logs"
compress_output = true
seed = 1

[[pipeline.mutations]]
type = "PartialOrderCreator"

[[pipeline.mutations]]
type = "LogSplitter"
frac = 0.5
save_compressed = true

[[pipeline.mutations]]
type = "ServiceTimeStdShifter"
activity = "Send Fine"
probability = [0.0, 0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.4, 0.5, 0.6, 0.7, 0.8, 0.9, 1.0]
standard_deviations = [0.0, 0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.4, 0.5, 0.6, 0.7, 0.8, 0.9, 1.0]
